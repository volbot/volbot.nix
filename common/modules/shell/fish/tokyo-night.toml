"$schema" = 'https://starship.rs/config-schema.json'

format = """
[‚ĖĎ‚Ėí‚Ėď](green)\
[ ůįäü ](bg:green fg:black)\
[Óāī](bg:red fg:green)\
$directory\
[Óāī](fg:red bg:magenta)\
$git_branch\
$git_status\
[Óāī](fg:magenta bg:yellow)\
$nix_shell\
[Óāī](fg:yellow bg:blue)\
$nodejs\
$rust\
$golang\
$php\
[Óāī](fg:blue bg:dgray)\
$time\
[Óāī ](fg:dgray)\
\n$character"""

[directory]
style = "fg:black bg:red"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Imagenes" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "bg:magenta"
format = '[[ $symbol $branch ](fg:black bg:magenta)]($style)'

[git_status]
style = "bg:magenta"
format = '[[($all_status$ahead_behind )](fg:black bg:magenta)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:blue"
format = '[[ $symbol ($version) ](fg:black bg:blue)]($style)'

[rust]
symbol = "Óě®"
style = "bg:blue"
format = '[[ $symbol ($version) ](fg:black bg:blue)]($style)'

[golang]
symbol = "Óėß"
style = "bg:blue"
format = '[[ $symbol ($version) ](fg:black bg:blue)]($style)'

[php]
symbol = "Óėą"
style = "bg:blue"
format = '[[ $symbol ($version) ](fg:black bg:blue)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:dgray"
format = '[[ Ôźļ $time ](fg:lgray bg:dgray)]($style)'

[nix_shell]
disabled = false
style = "bg:yellow"
format = '[[ ÔĆď $state(\($name\)) ](fg:black bg:yellow)]($style)'

[character]
success_symbol = """
 [‚äā\\(](bold white)\
[ůįČä ](bold green)\
